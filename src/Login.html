<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet" href="output.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family: 'Poppins', sans-serif;
}
</style>

</head>

<body class="min-h-screen bg-gradient-to-br from-blue-600 to-indigo-700 flex items-center justify-center">

<div class="bg-white rounded-2xl shadow-2xl flex overflow-hidden max-w-3xl">

    <!-- Login -->
    <div class="w-96 p-10">

        <img src="img/login.webp" class="w-28 mx-auto mb-4">

        <h1 class="text-3xl font-semibold text-center mb-6 text-gray-800">
            Welcome Back
        </h1>

        <form class="space-y-4">

            <div>
                <label class="text-gray-600 text-sm">User</label>
                <input type="text"
                class="w-full mt-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>

            <div>
                <label class="text-gray-600 text-sm">Password</label>
                <input type="password"
                class="w-full mt-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>

            <button
            class="w-full bg-blue-600 text-white p-3 rounded-lg font-semibold hover:bg-blue-700 transition duration-300">
            Login
            </button>

        </form>

    </div>

    <!-- Imagen -->
    <div class="bg-blue-500 flex items-center justify-center p-6">

        <img src="img/mario.png" class="w-72">

    </div>

</div>

</body>
</html>
